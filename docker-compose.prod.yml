services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pyarchinit_web
      POSTGRES_PASSWORD: pyarchinit_web_2024
      POSTGRES_DB: pyarchinit_web
    volumes:
      - web_pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://pyarchinit_web:pyarchinit_web_2024@db:5432/pyarchinit_web
      NEXTAUTH_URL: https://pyarchinit.com
      NEXTAUTH_SECRET: pyarchinit-web-secret-change-in-production
    depends_on:
      - db
    volumes:
      - web_uploads:/app/uploads
    ports:
      - "8080:3000"

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiZGQxNmY5ZDU5OWRkZjI0ZGRiOWViNzhkYWNmOWZlYzUiLCJ0IjoiYTlmZDllY2QtNjdiYy00NWE1LWI2NmEtMzQzYjgyMDI0ODMxIiwicyI6IllXVmxOV1kzTWpNdFlUYzRaQzAwTkRobUxUZzVZamd0TkRGbVl6a3hNRE00WW1KbCJ9
    depends_on:
      - app

volumes:
  web_pgdata:
  web_uploads:
